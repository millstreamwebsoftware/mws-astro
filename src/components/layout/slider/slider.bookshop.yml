spec:
  structures:
    - content_blocks
  label: Slider
  description: Rotating Carousel
  icon: view_carousel
  tags: ["layout"]
  place_groups_below: true
  groups:
    - heading: Section
      collapsed: true
      inputs:
        - content
        - classes
        - color
        - background_color
        - background_image
        - background_video
        - background_align
        - background_opacity
        - background_fixed
        - background_fit
  preview:
    subtext:
      - key: content_blocks[*]._bookshop_name
    metadata:
      - text:
          - key: classes
        icon: tag

blueprint:
  content_blocks: [bookshop:structure:slider_blocks]
  height: 50
  gap: 0
  autoplay: 0
  hoverpause: false
  perView: 1
  focus:
  bound: false
  showBullets: true
  showArrows: true
  hideUI: false
  indent:
  transition: slider
  animationDuration: 0.4
  minSlideWidth:

  content:
  classes:
  color:
  background_color:
  background_image:
  background_video:
  background_align:
  background_opacity:
  background_fixed:
  background_fit:

_inputs:
  height:
    type: number
    comment: Slider height, in percentage of browser window height (vh).
    options:
      min: 0
      max: 100
  gap:
    type: number
    comment: Gap betwen slides, in pixels (px).
    options:
      min: 0
      max: 100
  autoplay:
    type: number
    comment: Time between automatically switching slides in seconds. (0 to disable autoplay.)
    options:
      min: 0
  perView:
    type: number
    label: Slides Per View
    comment: Number of slides visible at once.
    hidden: minSlideWidth
    options:
      min: 1
      step: 1
  focus:
    type: choice
    options:
      values:
        - start
        - center
        - end
      allow_empty: true
  bound:
    label: Bound
    comment: Avoid showing empty space after last card in slider mode, useful when slides per view is >1.
    hidden: focusAtCenter
  transition:
    type: select
    comment: >
      Slider rewinds the slider to the start after last slide,
      Carousel continues in the same direction with the starting items added after the end.
      Fader does not slide and instead slowly fades between items (Fader overwrites some options).
    options:
      values:
        - slider
        - carousel
        - fader
  animationDuration:
    type: number
    comment: Time spent animating between slides. Lower is faster. Animations are spring-based, so the units are arbitrary.
    options:
      min: 0
      step: 0.1
      max: 10
  hoverpause:
    type: switch
    label: Pause autoplay on hover
  minSlideWidth:
    type: number
    label: Minimum Slide Width
    comment: Minimum width of each slide in pixels. When set, the number of slides per view adjusts automatically to fit. Leave unset to use Slides Per View directly.
    options:
      min: 100
